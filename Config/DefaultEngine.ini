; PSO-PRECACHING: compileer pipeline-state-objects vooraf/async (bij het laden van materialen tijdens het
; laadscherm) i.p.v. bij de eerste keer tekenen in-game -> dat verwijdert de "rendering shaders"-hitches
; tijdens het spelen (ook voor de 2e speler, elke proces precachet z'n eigen PSO's).
r.PSOPrecaching=1
r.PSOPrecache.Components=1
r.PSOPrecache.Resources=1
r.PSOPrecache.GlobalComputeShaders=1
; Teken een object pas zodra z'n PSO klaar is -> geen frame-stall; het object ploft hooguit een fractie later
; in i.p.v. de hele frame te laten hangen terwijl de PSO compileert.
; UE5.8: ProxyCreationWhenPSOReady is deprecated -> vervangen door ProxyCreationStrategy=1 (engine-default,
; zelfde "wacht op PSO"-gedrag). Voorkomt de deprecation-warning bij elke start.
