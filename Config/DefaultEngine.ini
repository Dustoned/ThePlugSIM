; === D3D12 RESERVED-RESOURCE FIX — tegen "Out of video memory" terwijl de VRAM grotendeels vrij is ===
; OORZAAK: de stad zit vol instanced meshes -> UE's GPU-Scene reserveert standaard een ~9,6 GB VIRTUELE
; tiled-buffer vooraf (r.GPUScene.UseReservedResources=true). Die "Reserved Buffer (Uncommitted)" slokt de
; adres-ruimte op zodat de schaduw-allocatie faalt zodra shadows aangaan -> OOM terwijl de kaart 10 GB vrij
; heeft. Hieronder zetten we dat reserved-resource-gedrag uit voor de zware subsystemen. Geen feature-verlies
; (alleen committed i.p.v. gereserveerde buffers, iets meer ECHT VRAM-gebruik). LET OP: ReadOnly-startup-
; cvars -> moeten hier in de ini (runtime-console doet niets).
[SystemSettings]
r.GPUScene.UseReservedResources=False
r.GPUScene.InstanceDataTileSizeLog2=-1
r.SparseVolumeTexture.Streaming.UseReservedResources=0
r.Nanite.Streaming.ReservedResources=0
r.Shadow.Virtual.AllocatePagePoolAsReservedResource=0
D3D12.AdjustTexturePoolSizeBasedOnBudget=1
rhi.ReservedResources.VirtualSizeWarningGB=8
; === PATH TRACER UIT — co-op-joiner-disconnect-fix ===
; De game gebruikt de path-tracer NERGENS (geen enkele source-referentie), maar r.RayTracing=True laat de
; engine bij init 24 Path-Tracing RTPSO-permutaties compileren die elk 70-110s duren en NIET precacheable
; zijn ("0 of them were precached"). Solo = alleen een lange laadtijd; in CO-OP bevriest die compile de
; joiner-gamethread zo lang (net-driver tikt 89s niet) dat de connectie een time-out krijgt -> de joiner
; vliegt terug naar het hoofdmenu (bewezen met lokale 2-instance repro). Path tracing uit = die 24 compiles
; verdwijnen; de RT-EFFECTEN uit de experimental-toggle (r.RayTracing blijft True) werken gewoon door.
r.PathTracing=0

; === CO-OP NET-TIMEOUTS ruimer — vangnet tegen valse joiner-drops bij eerste-join stalls ===
; Een verse joiner compileert bij de allereerste join nog wat PSO's (ook in de packaged build zijn niet
; alle PSO's precached). Zo'n korte game-thread-stall mag de connectie NIET laten time-outen. De UE-defaults
; (ConnectionTimeout 60s / InitialConnectTimeout 120s) zijn te krap voor deze zware map -> ruimer gezet.
; De echte oorzaak (path-tracer) is hierboven al weg; dit is de bretels-bij-de-riem.
[/Script/OnlineSubsystemUtils.IpNetDriver]
InitialConnectTimeout=180.0
ConnectionTimeout=120.0
TimeoutMultiplierForUnoptimizedBuilds=2.0
; === CO-OP BANDBREEDTE — 70 gerepliceerde crowd-NPC's passen niet in de default ~100KB/s ===
; Met de engine-default client-rate verhongeren de movement-updates (joiner ziet NPC's bevroren op hun
; eerste gerepliceerde positie, op andere plekken dan de host). 512KB/s geeft ruim budget voor de crowd
; (~70KB/s na de 10Hz-tuning) + de rest. LAN/VPN-co-op trekt dit makkelijk.
MaxClientRate=524288
MaxInternetClientRate=524288

