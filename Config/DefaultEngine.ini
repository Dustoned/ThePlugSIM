; === CLEAN LOG: onderdruk benigne, spammy log-categorieen zodat de console werkbaar blijft. ===
; Errors blijven ALTIJD zichtbaar (=Error toont Error + Fatal, verbergt Warning/Display/Log).
; - LogBlueprintUserMessages : de marketplace Level-BP "Print String"-spam ([CityBeachStrip...], elke 0,2s).
;                              Niet via script/editor te verwijderen (UE5.8-limiet); is toch weg in Shipping.
; - LogStaticMesh            : honderden "Nanite + translucent glass"-warnings van de strand-pack (laad-tijd).
; - LogChaos / LogPhysics    : kabel-spline convex-collision-warnings (onschuldig; kabels hebben geen collision nodig).
[Core.Log]
LogBlueprintUserMessages=Error
LogStaticMesh=Error
LogChaos=Error
LogPhysics=Error
; - LogCharacterMovement : NPC's die de movement-sub-step-limiet raken (cosmetisch; de AI loopt gewoon door). Engine-ruis.
; - LogEditorDataStorageUI: editor-UI widget-factory-warnings (editor-only; verdwijnt sowieso in de packaged build).
LogCharacterMovement=Error
LogEditorDataStorageUI=Error
; - LogNavigation     : "Recreating dtNavMesh ... mismatch in maxTiles" bij map-load (engine herbouwt de navmesh; benign).
; - LogConsoleManager : "r.MotionVectorSimulation used in render thread" (engine/plugin-interne CVar-melding; benign).
LogNavigation=Error
LogConsoleManager=Error
; - LogAudio          : "RecursiveApplyAdjuster failed ... clearing the level"-spam (honderden Display-regels per
;                       map-transitie terwijl het oude level wordt afgebroken; puur engine-teardown, geen probleem).
LogAudio=Warning
; - LogWorldPartition / LogStreaming : World-Partition cel-streaming-spam (~3100 Display-regels per sessie;
;   de beach-map streamt 300+ licht-Level-Instances in/uit -> werkt prima, puur ruis). Echte streaming-
;   fouten blijven zichtbaar (Warning+).
LogWorldPartition=Warning
LogStreaming=Warning
; - LogWorld          : "CleanupWorld for <Level-Instance>"-spam (honderden regels; licht/prop-instances die
;                       uit-streamen, benigne). De "Bringing World up for play"-mijlpaal vervalt (staat ook in LogLoad).
; - LogCrowdFollowing : "Unable to find RecastNavMesh ... UCrowdManager" - beach is nav-dead by design (direct-walk).
LogWorld=Warning
LogCrowdFollowing=Error
