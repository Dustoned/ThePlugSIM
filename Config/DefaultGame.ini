[/Script/UnrealEd.ProjectPackagingSettings]
; Zen-store UIT voor cooked output: zenserver draait sponsor-gekoppeld aan de cook-commandlet en
; stopt zodra die klaar is -> de stage-stap kan de oplog niet meer lezen ("connection refused",
; 3x gezien op 02-07). Loose cooked files = deterministisch packagen; DDC-cache blijft gewoon werken.
bUseZenStore=False
+DirectoriesToAlwaysStageAsUFS=(Path="BakedData")
; Materialen + sounds worden runtime via een pad geladen (M_Glass, M_NumGlow, UI-sounds, ...).
; Zonder harde referentie sloopt de cooker ze -> glas ondoorzichtig + geen UI-geluid in de build.
; Forceer deze mappen om mee te cooken.
+DirectoriesToAlwaysCook=(Path="/Game/_Project")
+DirectoriesToAlwaysCook=(Path="/Game/Game_UI_Sound_Pack")
; De strand-map + props en de character-packs worden runtime via string-paden geladen
; (OpenLevel, wardrobe-autodetectie, ApplySkinMesh, NPC-variatie) - geen harde referentie.
; Zonder dit cookt UE ze NIET: map ontbreekt (val terug naar menu) en speler/NPC's zijn leeg.
+DirectoriesToAlwaysCook=(Path="/Game/CityBeachStrip")
; UltraDynamicSky + Weather worden runtime via pad gespawnd (LoadClass/LoadObject in DayNightController) -
; geen harde referentie, dus zonder dit mist de hele lucht/het weer in de packaged build.
+DirectoriesToAlwaysCook=(Path="/Game/UltraDynamicSky")
+DirectoriesToAlwaysCook=(Path="/Game/Casual_Wear_Pack1")
+DirectoriesToAlwaysCook=(Path="/Game/Citizens_Pack")
+DirectoriesToAlwaysCook=(Path="/Game/GenericNPCAnimPack2")
; nieuwe character-packs (string-geladen crowd-skins). ALLEEN de Mesh/materials-submappen cooken -> NIET de
; meegeleverde ThirdPerson-demo (Blueprints/Maps), die op UE5.8 een kapotte VR-node (ResetOrientationAndPosition)
; heeft en de cook breekt. Skelet (Citizen_man: test_level_files/Mannequin) cookt mee via de mesh-referentie.
+DirectoriesToAlwaysCook=(Path="/Game/Gamer_Girl/Mesh")
+DirectoriesToAlwaysCook=(Path="/Game/SchoolGirl/Mesh")
+DirectoriesToAlwaysCook=(Path="/Game/Citizen_man_01/mesh")
+DirectoriesToAlwaysCook=(Path="/Game/Citizen_man_01/materials")
; Project-UI-font = Exo (Minimalist GUI-kit), runtime string-geladen in WeedUI::Font -> geen harde referentie.
; ALLEEN de fonts-submap cooken (NIET de 783 WBP-templates van de kit), anders valt de UI in de build terug op Roboto.
+DirectoriesToAlwaysCook=(Path="/Game/minimalist_gui/fonts")
; KitIcon laadt deze t_*-iconen via string (WeedUiStyle KitIcon; plant-kaart-gauges) - zaten NIET in de cook,
; dus kapot in packaged builds. ALLEEN de Icons/128-submap (2,8MB), niet de hele kit.
+DirectoriesToAlwaysCook=(Path="/Game/dark-gui-main-menu-pro-kit---complete-solution--honeti/dark-gui-main-menu-pro-kit---complete-solution--honeti/ultimate_dark_gui/textures/ThemeCommon/Textures/Icons/128")
; SettingsWidget laadt de kit-toggle/slider-templates via LoadClass (string) - zaten NIET in de cook,
; dus ALLE toggles+sliders in Settings ontbraken in de packaged build. Alleen deze 2 submappen (0,2MB),
; NIET de hele templates-map (22MB). Nieuwe kit-templates in code gebruiken? -> submap hier toevoegen!
+DirectoriesToAlwaysCook=(Path="/Game/minimalist_gui/widgets/templates/toggle")
+DirectoriesToAlwaysCook=(Path="/Game/minimalist_gui/widgets/templates/slider")
; WBP_PauseMenu wordt via LoadClass (string) geladen in PhoneClientComponent - geen harde referentie,
; dus het hele pauze-menu ontbrak in de packaged build. /Game/UI is onze eigen WBP-map (klein).
+DirectoriesToAlwaysCook=(Path="/Game/UI")
; Speler-skin 1 (Quinn) wordt runtime via LoadObject-pad geladen (ThePlugSIMCharacter/WardrobeWidget);
