[/Script/UnrealEd.ProjectPackagingSettings]
+DirectoriesToAlwaysStageAsUFS=(Path="BakedData")
; Materialen + sounds worden runtime via een pad geladen (M_Glass, M_NumGlow, UI-sounds, ...).
; Zonder harde referentie sloopt de cooker ze -> glas ondoorzichtig + geen UI-geluid in de build.
; Forceer deze mappen om mee te cooken.
+DirectoriesToAlwaysCook=(Path="/Game/_Project")
+DirectoriesToAlwaysCook=(Path="/Game/Game_UI_Sound_Pack")
; De strand-map + props en de character-packs worden runtime via string-paden geladen
; (OpenLevel, wardrobe-autodetectie, ApplySkinMesh, NPC-variatie) - geen harde referentie.
; Zonder dit cookt UE ze NIET: map ontbreekt (val terug naar menu) en speler/NPC's zijn leeg.
+DirectoriesToAlwaysCook=(Path="/Game/CityBeachStrip")
; UltraDynamicSky + Weather worden runtime via pad gespawnd (LoadClass/LoadObject in DayNightController) -
; geen harde referentie, dus zonder dit mist de hele lucht/het weer in de packaged build.
+DirectoriesToAlwaysCook=(Path="/Game/UltraDynamicSky")
+DirectoriesToAlwaysCook=(Path="/Game/Casual_Wear_Pack1")
+DirectoriesToAlwaysCook=(Path="/Game/Citizens_Pack")
+DirectoriesToAlwaysCook=(Path="/Game/GenericNPCAnimPack2")
+MapsToCook=(FilePath="/Game/CityBeachStrip/Maps/CityBeachStrip")
; BakedRooms = de gebakken apartments (via Tools/bake_rooms.py), runtime als overlay geladen
; (DoorRetrofitter via LoadLevelInstance, string-pad). Een dynamisch geladen level cookt NIET
; vanzelf mee, ook niet uit een always-cook-map -> expliciet in MapsToCook, anders geen apartments.
+MapsToCook=(FilePath="/Game/_Project/Maps/BakedRooms")
